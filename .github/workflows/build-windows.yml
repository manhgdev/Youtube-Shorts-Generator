# Build .exe (PyInstaller) trên Windows.
#
# Bản exe (Artifact): mọi lần push main/master, tag, hoặc workflow_dispatch.
#
# Trang Releases (/releases):
#   • Push nhánh main/master + có file VERSION (vd 1.0.1) → tạo/cập nhật tag v1.0.1 + đính exe.
#     Muốn lên 1.0.2: sửa VERSION trong repo, commit, push main → workflow ghi đè Release cùng tag (assets mới).
#   • Push tag bất kỳ → Release theo tag đó.
#   • Run workflow tay + ô release_tag → Release theo tag bạn nhập.
#
name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tạo GitHub Release với tag này (vd v1.0.0). Để trống = chỉ build + Artifact."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  pyinstaller:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller build_windows.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/AI-Youtube-Shorts-Generator.exe
          if-no-files-found: error

      - id: ver
        name: Đọc VERSION (chỉ nhánh main/master)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          if (-not (Test-Path VERSION)) {
            "skip=true" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $v = ((Get-Content VERSION -Raw) -replace '\s','').Trim()
          if ($v -notmatch '^\d+\.\d+\.\d+$') {
            "skip=true" >> $env:GITHUB_OUTPUT
            exit 0
          }
          "tag=v$v" >> $env:GITHUB_OUTPUT
          "skip=false" >> $env:GITHUB_OUTPUT

      - name: Tạo GitHub Release (push tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AI-Youtube-Shorts-Generator.exe
          generate_release_notes: true
          body: |
            Bản build Windows (PyInstaller). Cài [FFmpeg](https://ffmpeg.org/download.html) và thêm vào PATH. Đặt thư mục `assets` cạnh file exe nếu cần.

      - name: Tạo GitHub Release (chạy tay + có nhập tag)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/AI-Youtube-Shorts-Generator.exe
          generate_release_notes: true
          body: |
            Bản build Windows (PyInstaller). Cài [FFmpeg](https://ffmpeg.org/download.html) và thêm vào PATH. Đặt thư mục `assets` cạnh file exe nếu cần.

      - name: Tạo/cập nhật Release theo file VERSION (push main/master)
        if: success() && steps.ver.outputs.skip == 'false' && (github.event_name != 'workflow_dispatch' || inputs.release_tag == '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/AI-Youtube-Shorts-Generator.exe
          generate_release_notes: true
          make_latest: "true"
          body: |
            Bản build Windows (PyInstaller), phiên bản theo file `VERSION` trong repo (tag `${{ steps.ver.outputs.tag }}`).

            Cài [FFmpeg](https://ffmpeg.org/download.html) và thêm vào PATH. Đặt thư mục `assets` cạnh file exe nếu cần.

      - name: Gợi ý — Releases
        if: success() && github.ref_type == 'branch'
        run: |
          echo "::notice::Có file VERSION (vd 1.0.1) ở gốc repo → mỗi push main/master sẽ tạo/cập nhật Release tag v+VERSION. Hoặc push tag / Run workflow + release_tag."
