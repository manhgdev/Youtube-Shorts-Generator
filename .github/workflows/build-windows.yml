# Build .exe (PyInstaller) trên Windows.
#
# Bản exe:
#   • Push main/master hoặc workflow_dispatch → tab Actions → Artifacts → windows-exe
#
# Mục Releases (trang repo /releases):
#   • Cách 1 — push tag:  git tag v1.0.0 && git push origin v1.0.0
#   • Cách 2 — chạy tay: Actions → Build Windows EXE → Run workflow → điền "release_tag" (vd v1.0.0)
#
name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tạo GitHub Release với tag này (vd v1.0.0). Để trống = chỉ build + Artifact."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  pyinstaller:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller build_windows.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/AI-Youtube-Shorts-Generator.exe
          if-no-files-found: error

      - name: Tạo GitHub Release (push tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AI-Youtube-Shorts-Generator.exe
          generate_release_notes: true
          body: |
            Bản build Windows (PyInstaller). Cài [FFmpeg](https://ffmpeg.org/download.html) và thêm vào PATH. Đặt thư mục `assets` cạnh file exe nếu cần.

      - name: Tạo GitHub Release (chạy tay + có nhập tag)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/AI-Youtube-Shorts-Generator.exe
          generate_release_notes: true
          body: |
            Bản build Windows (PyInstaller). Cài [FFmpeg](https://ffmpeg.org/download.html) và thêm vào PATH. Đặt thư mục `assets` cạnh file exe nếu cần.

      - name: Gợi ý — tại sao chưa có Releases
        if: success() && github.ref_type == 'branch'
        run: |
          echo "::notice::Chỉ push code lên main → chỉ có Artifact, KHÔNG tạo Releases. Để có Releases: (1) git tag v1.0.0 && git push origin v1.0.0  HOẶC  (2) Actions → Run workflow → điền release_tag."
